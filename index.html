<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <link href="https://fonts.loli.net/css2?family=Material+Symbols+Outlined&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wwhip's Blog</title>
  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #1C1B1F;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .app-loader-ring {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(208, 188, 255, 0.2);
      border-top-color: #D0BCFF;
      border-radius: 50%;
      animation: loader-spin 0.8s linear infinite;
    }
    .app-loader-text {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 14px;
      color: rgba(208, 188, 255, 0.8);
      letter-spacing: 0.5px;
    }
    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app-loader">
    <div class="app-loader-ring"></div>
    <div class="app-loader-text">加载中...</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/Main.ts"></script>
  <script>
    const observer = new MutationObserver(() => {
      const app = document.getElementById('app');
      if (app && app.children.length > 0) {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 300);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('app'), { childList: true });
  </script>
</body>

</html>
